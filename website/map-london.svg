<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160" aria-hidden="true">
  <defs>
    <linearGradient id="mpMapBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a32"/>
      <stop offset="100%" stop-color="#081222"/>
    </linearGradient>
    <filter id="mpRouteGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="260" height="160" fill="url(#mpMapBg)"/>
  <!-- Parks -->
  <ellipse cx="48" cy="52" rx="22" ry="16" fill="rgba(32,215,129,0.06)"/>
  <ellipse cx="195" cy="118" rx="28" ry="18" fill="rgba(32,215,129,0.05)"/>
  <!-- Thames -->
  <path d="M-10 108 Q60 98, 110 104 T200 92 T270 88" fill="none" stroke="rgba(80,130,180,0.22)" stroke-width="10" stroke-linecap="round"/>
  <path d="M-10 108 Q60 98, 110 104 T200 92 T270 88" fill="none" stroke="rgba(100,160,220,0.12)" stroke-width="4" stroke-linecap="round"/>
  <!-- Major roads -->
  <path d="M0 42 L260 38" stroke="rgba(180,200,230,0.08)" stroke-width="3"/>
  <path d="M0 72 L260 68" stroke="rgba(180,200,230,0.1)" stroke-width="4"/>
  <path d="M0 128 L260 124" stroke="rgba(180,200,230,0.08)" stroke-width="3"/>
  <path d="M72 0 L68 160" stroke="rgba(180,200,230,0.07)" stroke-width="3"/>
  <path d="M130 0 L126 160" stroke="rgba(180,200,230,0.09)" stroke-width="4"/>
  <path d="M188 0 L184 160" stroke="rgba(180,200,230,0.07)" stroke-width="3"/>
  <!-- Curved arterials -->
  <path d="M20 20 C80 50, 120 30, 180 55 S240 40, 250 70" fill="none" stroke="rgba(180,200,230,0.06)" stroke-width="2"/>
  <path d="M10 140 C70 110, 140 135, 200 100 S250 120, 260 95" fill="none" stroke="rgba(180,200,230,0.06)" stroke-width="2"/>
  <!-- Area labels -->
  <text x="18" y="24" fill="rgba(147,168,196,0.45)" font-size="7" font-weight="600" letter-spacing="0.06em">CAMDEN</text>
  <text x="108" y="24" fill="rgba(147,168,196,0.45)" font-size="7" font-weight="600" letter-spacing="0.06em">CITY</text>
  <text x="178" y="24" fill="rgba(147,168,196,0.45)" font-size="7" font-weight="600" letter-spacing="0.06em">WESTMINSTER</text>
  <!-- Route halo -->
  <path d="M32 118 C72 98, 108 72, 142 58 S198 38, 232 28" fill="none" stroke="rgba(13,107,255,0.14)" stroke-width="12" stroke-linecap="round"/>
  <!-- Route -->
  <path class="route-animated" d="M32 118 C72 98, 108 72, 142 58 S198 38, 232 28" fill="none" stroke="#0D6BFF" stroke-width="3" stroke-linecap="round" pathLength="100" filter="url(#mpRouteGlow)"/>
  <!-- Origin -->
  <circle cx="32" cy="118" r="5" fill="#20D781" stroke="#fff" stroke-width="1.5"/>
  <circle cx="32" cy="118" r="10" fill="none" stroke="rgba(32,215,129,0.4)" stroke-width="1" class="origin-pulse"/>
  <!-- Destination -->
  <circle cx="232" cy="28" r="5" fill="#0D6BFF" stroke="#fff" stroke-width="1.5"/>
  <!-- Live position -->
  <circle cx="142" cy="58" r="16" fill="rgba(13,107,255,0.3)" class="mp-live-marker-pulse"/>
  <circle cx="142" cy="58" r="6" fill="#0D6BFF" stroke="#fff" stroke-width="2"/>
</svg>
